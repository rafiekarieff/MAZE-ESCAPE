<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Maze Escape</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #888; }
        .retry-button {
            margin-top: 2rem;
            padding: 10px 20px;
            background-color: #F30539;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your connection to the ancient ruins.</p>
    <button class="retry-button" onclick="window.location.reload()">RETRY CONNECTION</button>
</body>
</html>
